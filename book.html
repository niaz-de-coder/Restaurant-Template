<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Book a Table | GourmetBite</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ea2a33",
                        "background-light": "#f8f6f6",
                        "background-dark": "#1a0f0f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body { font-family: "Plus Jakarta Sans", sans-serif; }
        }
        .form-glass {
            @apply bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border border-white/20 dark:border-slate-800/50;
        }
        .input-field {
            @apply w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white/50 dark:bg-slate-800/50 p-4 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased">

    <header class="fixed top-0 z-50 w-full border-b border-primary/10 bg-white/90 dark:bg-background-dark/90 backdrop-blur-md">
        <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4 lg:px-12">
            <a class="flex items-center gap-2 text-primary" href="index.html">
                <span class="material-symbols-outlined text-3xl">restaurant</span>
                <h2 class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-slate-100">GourmetBite</h2>
            </a>
            <a href="index.html" class="flex items-center gap-2 text-sm font-bold hover:text-primary transition-colors">
                <span class="material-symbols-outlined text-sm">arrow_back</span> Back to Home
            </a>
        </div>
    </header>

    <main class="relative min-h-screen pt-24 pb-12 flex items-center justify-center overflow-hidden">
        <div class="absolute top-0 left-0 -z-10 h-full w-full">
            <div class="absolute top-[10%] left-[5%] h-64 w-64 rounded-full bg-primary/10 blur-[100px]"></div>
            <div class="absolute bottom-[10%] right-[5%] h-96 w-96 rounded-full bg-primary/5 blur-[120px]"></div>
        </div>

        <div class="mx-auto max-w-4xl w-full px-6">
            <div class="mb-10 text-center">
                <span class="inline-block rounded-full bg-primary/10 px-4 py-1 text-sm font-bold text-primary mb-4">Reservations</span>
                <h1 class="text-4xl font-extrabold tracking-tight md:text-5xl">Book Your <span class="text-primary">Experience</span></h1>
                <p class="mt-4 text-slate-600 dark:text-slate-400">Secure your spot at GourmetBite. We look forward to serving you.</p>
            </div>

            <div class="form-glass rounded-[2.5rem] p-8 md:p-12 shadow-2xl">
                <form action="#" class="space-y-8">
                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="ml-1 text-xs font-bold uppercase tracking-wider text-slate-500">Full Name</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
                                <input type="text" class="input-field pl-12" placeholder="John Doe" required>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="ml-1 text-xs font-bold uppercase tracking-wider text-slate-500">Email Address</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
                                <input type="email" class="input-field pl-12" placeholder="john@example.com" required>
                            </div>
                        </div>
                    </div>

                    <div class="grid md:grid-cols-3 gap-6">
                        <div class="space-y-2">
                            <label class="ml-1 text-xs font-bold uppercase tracking-wider text-slate-500">Select Date</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">calendar_today</span>
                                <input type="date" class="input-field pl-12" required>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="ml-1 text-xs font-bold uppercase tracking-wider text-slate-500">Time Slot</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">schedule</span>
                                <select class="input-field pl-12 appearance-none">
                                    <option>06:00 PM</option>
                                    <option>07:00 PM</option>
                                    <option>08:00 PM</option>
                                    <option>09:00 PM</option>
                                </select>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="ml-1 text-xs font-bold uppercase tracking-wider text-slate-500">Party Size</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xl">groups</span>
                                <select class="input-field pl-12 appearance-none">
                                    <option>2 People</option>
                                    <option>4 People</option>
                                    <option>6 People</option>
                                    <option>8+ People</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="ml-1 text-xs font-bold uppercase tracking-wider text-slate-500">Special Requests / Allergies</label>
                        <textarea class="input-field min-h-[120px] resize-none" placeholder="Let us know if you're celebrating something special..."></textarea>
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="group relative w-full overflow-hidden rounded-2xl bg-primary px-8 py-5 text-lg font-bold text-white shadow-2xl shadow-primary/30 transition-all hover:scale-[1.01] active:scale-95">
                            <span class="relative z-10 flex items-center justify-center gap-2">
                                Confirm Reservation
                                <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">bolt</span>
                            </span>
                            <div class="absolute inset-0 -z-0 bg-gradient-to-r from-transparent via-white/10 to-transparent translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                        </button>
                    </div>
                </form>
            </div>

            <div class="mt-8 flex items-center justify-center gap-6 text-slate-400">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-green-500">verified</span>
                    <span class="text-sm font-medium">Instant Confirmation</span>
                </div>
                <div class="h-4 w-[1px] bg-slate-200 dark:bg-slate-800"></div>
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">lock</span>
                    <span class="text-sm font-medium">Secure Booking</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center text-sm text-slate-500 dark:text-slate-400">
        <p>© 2024 GourmetBite. Crafted for Excellence.</p>
    </footer>

</body>
</html>
